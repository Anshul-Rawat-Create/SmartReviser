<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Questions - Smart Reviser</title>
    <link rel="stylesheet" href="/css/questions.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/html/dashboard.html" class="nav-brand">
                <span>📚</span>
                Smart Reviser
            </a>
            <div class="nav-links">
                <a href="/html/dashboard.html">Dashboard</a>
                <a href="/html/practice_list.html">Practice</a>
                <a href="/html/daily_task.html">Daily Task</a>
                <a href="/html/leaderboard.html">Leaderboard</a>
            </div>
            <div class="nav-user">
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>📝 Question Management</h1>
            <p>Add, edit, or manage questions in the question bank</p>
        </div>

        <div class="content-grid">
            <!-- Add Question Form -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Add New Question</h2>
                </div>
                <div class="card-body">
                    <form id="addQuestionForm">
                        <div class="form-group">
                            <label for="questionText">Question Text</label>
                            <textarea id="questionText" name="questionText" rows="4" placeholder="Enter your question..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Options (4 required)</label>
                            <input type="text" class="option-input" placeholder="Option 1" required>
                            <input type="text" class="option-input" placeholder="Option 2" required>
                            <input type="text" class="option-input" placeholder="Option 3" required>
                            <input type="text" class="option-input" placeholder="Option 4" required>
                        </div>

                        <div class="form-group">
                            <label for="correctAnswer">Correct Answer</label>
                            <select id="correctAnswer" name="correctAnswer" required>
                                <option value="">Select correct option</option>
                                <option value="1">Option 1</option>
                                <option value="2">Option 2</option>
                                <option value="3">Option 3</option>
                                <option value="4">Option 4</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="topic">Topic</label>
                                <select id="topic" name="topic" required>
                                    <option value="">Select topic</option>
                                    <option value="Java">Java</option>
                                    <option value="Python">Python</option>
                                    <option value="JavaScript">JavaScript</option>
                                    <option value="SQL">SQL</option>
                                    <option value="Data Structures">Data Structures</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="difficulty">Difficulty</label>
                                <select id="difficulty" name="difficulty" required>
                                    <option value="">Select difficulty</option>
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="language">Language</label>
                                <select id="language" name="language" required>
                                    <option value="">Select language</option>
                                    <option value="English">English</option>
                                    <option value="Hindi">Hindi</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">Add Question</button>
                    </form>
                </div>
            </div>

            <!-- Question List -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Recent Questions</h2>
                    <button class="btn-outline" onclick="loadQuestions()" style="padding: 8px 16px; font-size: 14px;">
                        🔄 Refresh
                    </button>
                </div>
                <div class="card-body">
                    <div class="question-list" id="questionList">
                        <!-- Questions will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/questions.js"></script>
</body>
</html>
